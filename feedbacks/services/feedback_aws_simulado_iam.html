        function renderHeader() {
            const container = document.getElementById('headerContainer');
            const { name, icon, badgeIcon, badgeClass, color, tags } = serviceConfig;
            const totalCount = Object.values(questionsDatabase).reduce((sum, arr) => sum + arr.length, 0);
            const simuladoCount = Object.keys(questionsDatabase).length;

            const tagsHtml = tags.map(tag =>
                `<span class="badge bg-light text-dark border ms-1">${tag}</span>`
            ).join('');

            container.innerHTML = `
        <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
            <div>
                <h1 class="main-title display-6 mb-0">
                    <i class="bi ${icon} text-warning me-2" style="color:${color} !important;"></i>${name} – Questões Diretas
                </h1>
                <p class="text-muted mt-2" style="font-size:0.98rem;">
                    <i class="bi bi-check2-circle text-success me-1"></i> ${totalCount} questões em ${simuladoCount} simulado(s)
                    ${tagsHtml}
                </p>
            </div>
            <span class="${badgeClass} badge rounded-pill px-4 py-2">
                <i class="bi ${badgeIcon} me-1"></i> ${name}
            </span>
        </div>
    `;
        }

        function renderQuestionCard(q, arquivo) {
            const optionsHtml = q.options.map(opt => {
                const badge = opt.correct ?
                    `<span class="badge-correct ms-2"><i class="bi bi-check-circle-fill me-1"></i>Correta</span>` :
                    `<span class="badge-incorrect ms-2"><i class="bi bi-x-circle-fill me-1"></i>Incorreta</span>`;
                const optionClass = opt.correct ? 'option-item correct' : 'option-item incorrect';
                return `<div class="${optionClass}">
                    <span class="option-letter">${opt.letter}.</span>
                    <span class="option-text"><strong>${opt.text}</strong> ${badge}</span>
                </div>`;
            }).join('');

            const explanationsHtml = q.explanations.map(exp => {
                const expClass = exp.correct ? 'alt-explication correct-alt' : 'alt-explication incorrect-alt';
                const icon = exp.correct ? 'bi-check-circle-fill text-success' : 'bi-x-circle-fill text-danger';
                const label = exp.correct ? 'CORRETA' : 'INCORRETA';
                return `<div class="${expClass}">
                    <strong><i class="bi ${icon} me-1"></i> ${label}</strong><br>
                    ${exp.text}
                </div>`;
            }).join('');

            const glossaryHtml = q.glossary.map(item => `<li>${item}</li>`).join('');
            const generalHtml = q.generalExplanation.map(item => `<li>${item}</li>`).join('');
            const realWorldHtml = q.realWorld.map(item => `<li>${item}</li>`).join('');

            return `
        <div class="card card-question mb-5">
            <div class="card-header-custom">
                <span class="q-number">Q${q.id}</span>
                <span class="q-simulado">${arquivo}</span>
                <span class="q-text flex-grow-1">${q.title}</span>
                <span class="domain-tag"><i class="bi bi-tag me-1"></i> ${q.domain}</span>
            </div>
            <div class="card-body p-4">
                <p class="fw-semibold text-secondary" style="font-size:0.95rem;">${q.prompt}</p>
                <div class="mt-3">${optionsHtml}</div>

                <div class="explanation-box">
                    <h6><i class="bi bi-lightbulb-fill text-warning me-2"></i>Explicação de todas as alternativas</h6>
                    ${explanationsHtml}
                </div>

                <div class="glossary-card">
                    <h6><i class="bi bi-book me-2"></i>💡 GLOSSÁRIO</h6>
                    <ul>${glossaryHtml}</ul>

                    <div class="general-explanation">
                        <h6><i class="bi bi-globe2 me-2"></i>🌐 EXPLICAÇÃO GERAL</h6>
                        <ul>${generalHtml}</ul>
                    </div>

                    <div class="real-world">
                        <h6><i class="bi bi-rocket-takeoff me-2"></i>🚀 COMO ISSO SE APLICA NA VIDA REAL</h6>
                        <ul>${realWorldHtml}</ul>
                    </div>
                </div>
            </div>
        </div>
    `;
        }

                    </div>
                </div>
                ${questoes.map(q => renderQuestionCard(q, arquivo)).join('')}
            </div>
        `;
            }

            container.innerHTML = html;
        }

        function renderFooter() {
            const totalCount = Object.values(questionsDatabase).reduce((sum, arr) => sum + arr.length, 0);
            const simuladoCount = Object.keys(questionsDatabase).length;
            const { name } = serviceConfig;
            document.getElementById('footerText').innerHTML = `
        ${totalCount} questões diretas sobre ${name} – AWS Certified Developer Associate (DVA-C02)
        <br><span class="text-muted" style="font-size:0.85rem;">${simuladoCount} simulado(s) • Domínios: Segurança e Desenvolvimento • Todas as explicações completas</span>
    `;
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderAnchorNav();
            renderQuestions();
            renderFooter();
        });
    </script>

</body>
