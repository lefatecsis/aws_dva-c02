                        { correct: false, text: "Incorreta. Amazon Redshift é um destino suportado pelo Kinesis Firehose. Os dados são inicialmente entregues a um bucket do S3 e, em seguida, carregados no cluster Redshift usando o comando COPY." },
                        { correct: true, text: "Correta. Amazon ElastiCache é um serviço totalmente gerenciado de armazenamento em memória compatível com Redis ou Memcached, mas não é um destino suportado pelo Amazon Kinesis Data Firehose. Portanto, não é possível enviar dados diretamente para ElastiCache via Firehose." }
                    ],
                    glossary: [
                        "Amazon Kinesis Data Firehose: Serviço gerenciado da AWS para captura, transformação e entrega automática de dados em streaming para destinos como armazenamento e análise.",
                        "Amazon S3: Serviço de armazenamento de objetos altamente escalável e durável.",
                        "Amazon Redshift: Data warehouse totalmente gerenciado para análise rápida de grandes volumes de dados estruturados.",
                        "Amazon Elasticsearch Service (Amazon ES / OpenSearch Service): Serviço gerenciado para busca, análise e visualização de dados em tempo real.",
                        "Amazon ElastiCache: Serviço gerenciado de cache em memória (Redis ou Memcached) para acelerar aplicações com armazenamento temporário de dados.",
                        "Sink type: Tipo de destino final para onde os dados são enviados em um pipeline de streaming."
                    ],
                    generalExplanation: [
                        "O Amazon Kinesis Data Firehose permite entregar dados em streaming diretamente para destinos S3, Redshift e OpenSearch, garantindo ingestão contínua, escalável e durável.",
                        "É possível configurar ainda backups no S3 para segurança adicional.",
                        "ElastiCache não é um destino suportado pelo Firehose, pois é um cache em memória destinado a acesso rápido de dados temporários, e não a ingestão ou armazenamento contínuo.",
                        "Assim, qualquer alternativa que indique ElastiCache como destino direto do Firehose está incorreta."
                    ],
                    realWorld: [
                        "Um desenvolvedor de pipelines de dados em tempo real pode usar o Firehose para:",
                        "Armazenar logs de eventos no S3 para durabilidade e auditoria.",
                        "Enviar dados para o Redshift para análises complexas e agregações.",
                        "Enviar dados para OpenSearch para dashboards em tempo real e monitoramento.",
                        "Por exemplo, em uma aplicação serverless que processa logs de acesso via AWS Lambda, o Kinesis Data Firehose pode receber esses logs e enviá-los automaticamente para S3 e OpenSearch, permitindo monitoramento contínuo, alta disponibilidade e escalabilidade sem necessidade de gerenciar servidores adicionais."
                    ]
                }
            ]
        };

        // ============================================================
        // FUNÇÕES RENDERIZADORAS
        // ============================================================

        function renderHeader() {
            const container = document.getElementById('headerContainer');
            const { name, icon, badgeIcon, badgeClass, color, tags } = serviceConfig;
            const totalCount = Object.values(questionsDatabase).reduce((sum, arr) => sum + arr.length, 0);
            const simuladoCount = Object.keys(questionsDatabase).length;

            const tagsHtml = tags.map(tag =>
                `<span class="badge bg-light text-dark border ms-1">${tag}</span>`
            ).join('');

            container.innerHTML = `
        <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
            <div>
                <h1 class="main-title display-6 mb-0">
                    <i class="bi ${icon} text-warning me-2" style="color:${color} !important;"></i>${name} – Questões Diretas
                </h1>
                <p class="text-muted mt-2" style="font-size:0.98rem;">
                    <i class="bi bi-check2-circle text-success me-1"></i> ${totalCount} questões em ${simuladoCount} simulado(s)
                    ${tagsHtml}
                </p>
            </div>
            <span class="${badgeClass} badge rounded-pill px-4 py-2">
                <i class="bi ${badgeIcon} me-1"></i> ${name}
            </span>
        </div>
    `;
        }

        function renderQuestionCard(q, arquivo) {
            const optionsHtml = q.options.map(opt => {
                const badge = opt.correct ?
                    `<span class="badge-correct ms-2"><i class="bi bi-check-circle-fill me-1"></i>Correta</span>` :
                    `<span class="badge-incorrect ms-2"><i class="bi bi-x-circle-fill me-1"></i>Incorreta</span>`;
                const optionClass = opt.correct ? 'option-item correct' : 'option-item incorrect';
                return `<div class="${optionClass}">
                    <span class="option-letter">${opt.letter}.</span>
                    <span class="option-text"><strong>${opt.text}</strong> ${badge}</span>
                </div>`;
            }).join('');

            const explanationsHtml = q.explanations.map(exp => {
                const expClass = exp.correct ? 'alt-explication correct-alt' : 'alt-explication incorrect-alt';
                const icon = exp.correct ? 'bi-check-circle-fill text-success' : 'bi-x-circle-fill text-danger';
                const label = exp.correct ? 'CORRETA' : 'INCORRETA';
                return `<div class="${expClass}">
                    <strong><i class="bi ${icon} me-1"></i> ${label}</strong><br>
                    ${exp.text}
                </div>`;
            }).join('');

            const glossaryHtml = q.glossary.map(item => `<li>${item}</li>`).join('');
            const generalHtml = q.generalExplanation.map(item => `<li>${item}</li>`).join('');
            const realWorldHtml = q.realWorld.map(item => `<li>${item}</li>`).join('');

            return `
        <div class="card card-question mb-5">
            <div class="card-header-custom">
                <span class="q-number">Q${q.id}</span>
                <span class="q-simulado">${arquivo}</span>
                <span class="q-text flex-grow-1">${q.title}</span>
                <span class="domain-tag"><i class="bi bi-tag me-1"></i> ${q.domain}</span>
            </div>
            <div class="card-body p-4">
                <p class="fw-semibold text-secondary" style="font-size:0.95rem;">${q.prompt}</p>
                <div class="mt-3">${optionsHtml}</div>

                <div class="explanation-box">
                    <h6><i class="bi bi-lightbulb-fill text-warning me-2"></i>Explicação de todas as alternativas</h6>
                    ${explanationsHtml}
                </div>

                <div class="glossary-card">
                    <h6><i class="bi bi-book me-2"></i>💡 GLOSSÁRIO</h6>
                    <ul>${glossaryHtml}</ul>

                    <div class="general-explanation">
                        <h6><i class="bi bi-globe2 me-2"></i>🌐 EXPLICAÇÃO GERAL</h6>
                        <ul>${generalHtml}</ul>
                    </div>

                    <div class="real-world">
                        <h6><i class="bi bi-rocket-takeoff me-2"></i>🚀 COMO ISSO SE APLICA NA VIDA REAL</h6>
                        <ul>${realWorldHtml}</ul>
                    </div>
                </div>
            </div>
        </div>
    `;
        }

        function renderAnchorNav() {
            const nav = document.getElementById('anchorNav');
            const simulados = Object.keys(questionsDatabase);
            nav.innerHTML = simulados.map(arquivo => {
                const label = arquivo.replace('feedback_aws_simulado_', 'Simulado ');
                return `<a href="#${arquivo}"><i class="bi bi-bookmark-fill me-1"></i>${label}</a>`;
            }).join('');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';

            for (const [arquivo, questoes] of Object.entries(questionsDatabase)) {
                html += `
            <div class="simulado-section mb-5" id="${arquivo}">
                <div class="simulado-section-header d-flex align-items-center gap-3 mb-4 p-3 rounded-3" style="background:#f0f4ff; border-left:5px solid #ff9900;">
                    <i class="bi bi-journal-bookmark-fill fs-4" style="color:#ff9900;"></i>
                    <div>
                        <div class="fw-bold fs-5" style="color:#1a2a4a;">${arquivo}</div>
                        <div class="text-muted" style="font-size:0.85rem;">
                            <i class="bi bi-collection me-1"></i>${questoes.length} questão(ões)
                        </div>
                    </div>
                </div>
                ${questoes.map(q => renderQuestionCard(q, arquivo)).join('')}
            </div>
        `;
            }

            container.innerHTML = html;
        }

        function renderFooter() {
            const totalCount = Object.values(questionsDatabase).reduce((sum, arr) => sum + arr.length, 0);
            const simuladoCount = Object.keys(questionsDatabase).length;
            const { name } = serviceConfig;
            document.getElementById('footerText').innerHTML = `
        ${totalCount} questões diretas sobre ${name} – AWS Certified Developer Associate (DVA-C02)
        <br><span class="text-muted" style="font-size:0.85rem;">${simuladoCount} simulado(s) • Domínios: Segurança e Desenvolvimento • Todas as explicações completas</span>
    `;
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderAnchorNav();
            renderQuestions();
            renderFooter();
        });
    </script>

</body>

</html>
