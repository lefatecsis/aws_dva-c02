                    glossary: "💡 GLOSSÁRIO\n● AWS CodePipeline: Serviço de entrega contínua (CI/CD) que automatiza as etapas de compilação, teste e implantação de aplicações, integrando diversos serviços AWS e ferramentas externas.\n● Amazon CloudWatch Events / EventBridge: Serviço que detecta e roteia eventos em tempo quase real de diferentes fontes AWS (como CodePipeline, EC2, S3) para destinos configuráveis, como funções Lambda, Step Functions ou filas SQS.\n● Função Lambda: Serviço de computação serverless que executa código sob demanda em resposta a eventos, eliminando a necessidade de gerenciar servidores.\n● Gatilho (Trigger): Mecanismo que invoca automaticamente uma função Lambda quando um evento ocorre, como a mudança de status de um pipeline.\n● Alarme CloudWatch: Recurso baseado em métricas numéricas que dispara ações (como notificações) quando um limite pré-definido é ultrapassado.\n● Fonte de Eventos: Origem que gera eventos observáveis, como o CodePipeline, que emite notificações ao iniciar, concluir ou falhar em uma execução.\n● Regra CloudWatch Events / EventBridge: Configuração que filtra eventos específicos e define ações automáticas (alvos) que devem ser executadas quando esses eventos são detectados.\n● Pipeline: Conjunto de etapas automatizadas que definem o fluxo de integração e entrega contínua, desde o commit de código até a implantação final.",
                    generalExplanation: "🌐 EXPLICAÇÃO GERAL\nA melhor forma de integrar uma função Lambda a mudanças de estado no CodePipeline é por meio de uma regra do Amazon CloudWatch Events (EventBridge).\n\nO CodePipeline publica automaticamente eventos ao longo do seu ciclo de vida — por exemplo, quando uma execução inicia, é aprovada, falha ou é concluída com sucesso. Esses eventos podem ser capturados por uma regra no EventBridge, que atua como intermediário entre o pipeline e a função Lambda, invocando-a conforme as condições configuradas.\n\nEssa abordagem é mais flexível e desacoplada do que soluções baseadas em alarmes CloudWatch, pois permite reagir a eventos específicos e em tempo real, sem depender de métricas ou monitoramentos periódicos.\n\nAlém disso, a integração via EventBridge → Lambda segue as boas práticas AWS para arquiteturas orientadas a eventos, garantindo escalabilidade, simplicidade de manutenção e baixo acoplamento entre os componentes.",

                    glossary: "💡 GLOSSÁRIO\n● AWS Lambda: Serviço de computação serverless da AWS que executa código em resposta a eventos, sem necessidade de provisionar ou gerenciar servidores.\n● Amazon API Gateway: Serviço totalmente gerenciado que permite criar, publicar e monitorar APIs RESTful e WebSocket, atuando como a camada de entrada para funções Lambda e outros backends.\n● Variável de Estágio: Parâmetro configurável em um estágio do API Gateway, usado para definir valores dinâmicos, como nomes de funções, URIs ou chaves de configuração específicas por ambiente (ex.: dev, staging, prod).\n● Política Baseada em Recursos: Tipo de política IAM anexada diretamente a um recurso AWS (como uma função Lambda, bucket S3 ou tópico SNS) para controlar quem pode acessá-lo e de onde.\n● ARN (Amazon Resource Name): Identificador exclusivo usado para referenciar recursos AWS em políticas, logs e integrações.\n● Alias Lambda: Nome alternativo que aponta para uma versão específica de uma função Lambda, útil para controlar deploys e roteamento de versões.\n● Backoff Exponencial: Estratégia de repetição de tentativas (retries) com intervalos progressivamente maiores, usada para lidar com erros transitórios e evitar sobrecarga.\n● Erro 500 (Internal Server Error): Código de status HTTP genérico indicando falha no processamento interno de uma requisição no servidor.",
                    generalExplanation: "🌐 EXPLICAÇÃO GERAL\nPara que o API Gateway consiga invocar uma função Lambda utilizando uma variável de estágio, é essencial que a função Lambda possua uma política baseada em recursos que autorize explicitamente o API Gateway a invocá-la.\n\nEssa permissão deve ser concedida no nível da função Lambda, por exemplo, com uma política que permita a ação lambda:InvokeFunction para o principal apigateway.amazonaws.com.\n\nSem essa permissão, o API Gateway retorna um erro 500 (Internal Server Error), indicando falha na execução da requisição — não por erro de código, mas por ausência de autorização entre serviços.\n\nAlém disso, ao configurar a variável de estágio, o valor usado deve ser o nome da função (com ou sem alias), e não o ARN completo. Isso garante que o API Gateway resolva corretamente a invocação, substituindo dinamicamente a variável conforme o ambiente.\n\nTécnicas como backoff exponencial são eficazes para lidar com rate limits (throttling), mas não se aplicam a esse tipo de erro de autorização.",
                    realWorld: "🚀 APLICAÇÃO NO MUNDO REAL\nEm uma arquitetura serverless moderna, é comum que um time de desenvolvimento mantenha vários ambientes (como dev, staging e prod) para uma mesma API. O API Gateway utiliza variáveis de estágio para alternar dinamicamente entre versões ou aliases de uma função Lambda — por exemplo, myFunction:dev ou myFunction:prod.\n\nEsse modelo permite atualizar a função ou direcionar o tráfego para uma nova versão sem alterar a configuração da API. Contudo, se a política baseada em recursos da função não permitir a invocação pelo API Gateway, as requisições resultarão em erro 500, interrompendo o fluxo da aplicação.\n\nUm exemplo prático seria:\n• Em produção, o alias Prod da função Lambda está configurado para a versão 10.\n• A variável de estágio lambdaAlias no API Gateway está definida como Prod.\n• A equipe cria uma nova versão (11) e altera o alias Prod para apontar para essa versão — sem precisar reimplantar a API.\n\nEssa abordagem traz flexibilidade, segurança e controle de versionamento, mas exige que as permissões IAM estejam corretamente configuradas. Garantir essa integração evita falhas de autorização e mantém a API altamente disponível e segura — uma prática essencial em arquiteturas serverless em produção."

                    glossary: "💡 GLOSSÁRIO\n● AWS Lambda: Serviço de computação serverless da AWS que executa código em resposta a eventos, sem necessidade de provisionar ou gerenciar servidores.\n● /tmp: Diretório temporário local disponível durante a execução de uma função Lambda, com até 512 MB de espaço gravável. É o único diretório com permissão de escrita.\n● /opt: Diretório reservado para bibliotecas e dependências adicionais empacotadas junto à função Lambda. Normalmente é somente leitura durante a execução.\n● Bucket S3: Serviço de armazenamento de objetos durável, escalável e persistente, usado para armazenar dados de forma permanente e acessível globalmente.\n● Pacote ZIP da Função: Arquivo que contém o código-fonte e as dependências da função Lambda. Esse pacote é montado em um sistema de arquivos somente leitura quando a função é executada.",
                    generalExplanation: "🌐 EXPLICAÇÃO GERAL\nDurante a execução de uma função Lambda, o ambiente de execução é temporário e isolado. Por isso, a única área gravável é o diretório /tmp, com um limite de 512 MB de armazenamento efêmero.\n\nQuando a função precisa armazenar arquivos temporários, como resultados intermediários, logs locais ou dados em processamento, o /tmp é a escolha correta, pois:\n• Está disponível somente durante a execução da função.\n• Oferece baixa latência de leitura e escrita, já que é local.\n• Os dados são descartados automaticamente ao término da execução, evitando acúmulo de arquivos entre invocações.\n\nAs demais opções são inadequadas para armazenamento temporário:\n• Pacote ZIP da função: é somente leitura.\n• /opt: reservado a dependências, também somente leitura.\n• S3: é persistente, introduz latência e custo por requisição, sendo mais indicado para armazenamento de longo prazo.\n\nPortanto, /tmp é a melhor prática e a solução recomendada pela AWS para manipulação de arquivos temporários dentro de funções Lambda.",

                        "Correta. O Amazon CloudWatch Events permite criar regras que executam funções Lambda em intervalos regulares, como a cada hora, utilizando expressões de taxa fixa ou expressões cron, proporcionando uma solução serverless para agendamento.",

                    glossary: "💡 GLOSSÁRIO\n● CloudWatch Events (agora Amazon EventBridge): Serviço da AWS que permite executar ações automaticamente em resposta a eventos ou em horários programados, usando regras de agendamento baseadas em cron ou rate.\n● Amazon S3: Serviço de armazenamento de objetos escalável e durável usado para guardar e recuperar qualquer volume de dados a qualquer momento.\n● Amazon SQS: Serviço de fila de mensagens que desacopla componentes de aplicações distribuídas, permitindo comunicação assíncrona entre serviços.\n● Amazon Kinesis: Serviço voltado para ingestão e processamento de dados em tempo real (streaming).\n● Expressão Cron: Formato utilizado para definir horários exatos e recorrentes de execução, como 'todo dia às 03:00' ou 'toda segunda-feira às 09:00'.\n● Serverless: Modelo de arquitetura em que o provedor de nuvem (AWS) gerencia automaticamente a infraestrutura, permitindo que o desenvolvedor se concentre apenas no código.\n● AWS Lambda: Serviço de computação serverless que executa código em resposta a eventos sem necessidade de provisionar ou manter servidores.\n● Taxa fixa (Rate): Configuração de agendamento que define intervalos regulares de execução, como 'a cada 5 minutos' ou 'a cada 1 hora'.",
                    generalExplanation: "🌐 EXPLICAÇÃO GERAL\nPara executar uma função Lambda periodicamente, o serviço correto é o Amazon CloudWatch Events (atualmente parte do Amazon EventBridge).\n\nEle permite criar regras de agendamento usando expressões cron (para horários específicos) ou rate (para intervalos fixos), que disparam automaticamente a execução da função Lambda conforme a periodicidade definida.\n\nEssa solução é totalmente serverless, eliminando a necessidade de servidores, instâncias EC2 ou scripts manuais para orquestrar agendamentos. Além disso, oferece:\n• Alta disponibilidade e baixa manutenção;\n• Escalabilidade automática, ajustando-se à carga da função;\n• Custo baseado em uso, pagando apenas pelas execuções.\n\nOutros serviços como S3, SQS ou Kinesis não possuem recursos nativos de agendamento periódico — eles são orientados a eventos (upload de arquivo, envio de mensagem, fluxo de dados) e não à execução temporal recorrente.\n\nPortanto, a combinação CloudWatch Events + Lambda é a forma mais simples, escalável e econômica de executar tarefas recorrentes automatizadas na AWS.",

                    glossary: "💡 GLOSSÁRIO\n● Concorrência Provisionada: Mecanismo do AWS Lambda que mantém ambientes de execução pré-inicializados e prontos para responder imediatamente, eliminando o tempo de inicialização (cold start).\n● Concorrência Reservada: Define o número máximo de execuções simultâneas garantidas para uma função Lambda, impedindo que outras funções usem essa capacidade, mas não reduz o tempo de inicialização.\n● Cold Start: Atraso que ocorre quando o Lambda precisa inicializar um novo ambiente de execução, incluindo carregamento de código, dependências e runtime.\n● API Gateway: Serviço gerenciado que cria, publica e protege APIs REST e WebSocket, permitindo a integração entre clientes e funções Lambda.\n● Endpoint de Interface VPC: Conexão privada entre uma VPC e serviços AWS por meio do AWS PrivateLink, melhorando segurança e latência de rede, mas sem efeito sobre cold starts.\n● Cache no API Gateway: Armazenamento temporário de respostas para reduzir chamadas repetidas à Lambda, melhorando o tempo de resposta para dados estáticos, mas sem impacto na inicialização da função.\n● Runtime Lambda: Ambiente de execução da função, responsável por interpretar e rodar o código no contexto definido (ex.: Node.js, Python, Java).\n● Handler: Função principal que processa eventos recebidos pelo Lambda, definida como ponto de entrada da execução.",
                    generalExplanation: "🌐 EXPLICAÇÃO GERAL\nO problema em questão é o cold start, um fenômeno comum em funções Lambda que causa atraso inicial na execução quando não há ambientes previamente inicializados. Esse atraso pode impactar significativamente aplicações sensíveis à latência, como APIs síncronas, sistemas de autenticação ou microserviços de alta demanda.\n\nA solução correta é habilitar concorrência provisionada, que mantém uma quantidade configurada de ambientes Lambda em estado 'quente', prontos para atender requisições de forma imediata. Dessa forma, elimina-se o tempo de inicialização e garante-se desempenho consistente e previsível.\n\nOutras opções não resolvem o problema do cold start:\n• Concorrência reservada apenas limita o número máximo de execuções simultâneas, sem manter ambientes pré-carregados.\n• Cache no API Gateway melhora a latência para dados repetidos, mas não reduz o tempo de inicialização da função.\n• Endpoints de Interface VPC otimizam conectividade de rede, porém não influenciam o tempo de arranque do Lambda.\n\nPortanto, Concorrência Provisionada é a única abordagem diretamente eficaz para mitigar cold starts em funções Lambda de resposta rápida.",
                    realWorld: "🚀 APLICAÇÃO NO MUNDO REAL\nImagine uma API REST que processa logins de usuários via API Gateway e AWS Lambda. Durante períodos de baixa atividade, as funções podem ficar inativas, e ao receber a primeira requisição após algum tempo, o usuário percebe atrasos de 1 a 3 segundos — o cold start.\n\nAo configurar Concorrência Provisionada para, por exemplo, 5 instâncias da função authHandler, o time de desenvolvimento garante que:\n• As funções já estejam inicializadas e prontas para execução imediata;\n• A latência permaneça baixa e previsível, mesmo em horários de pico;\n• A experiência do usuário final seja consistente e responsiva.\n\nEssa prática é amplamente usada em ambientes críticos, como:\n• Plataformas de e-commerce durante campanhas de alto tráfego;\n• Aplicações de autenticação e pagamentos, que não toleram lentidão;\n• Sistemas de monitoramento em tempo real, onde cada segundo é crucial.\n\nAo combinar Concorrência Provisionada com Auto Scaling e API Gateway, as equipes alcançam o equilíbrio ideal entre desempenho, custo e confiabilidade, alinhado às melhores práticas serverless da AWS."

                    <div class="mt-3">${optionsHtml}</div>

                    <div class="explanation-box">
                        <h6><i class="bi bi-lightbulb-fill text-warning me-2"></i>Explicação de todas as alternativas</h6>
                        ${explanationsHtml}
                    </div>

                    <div class="glossary-card">
                        <h6><i class="bi bi-book me-2"></i>💡 GLOSSÁRIO</h6>
                        <ul>${glossaryHtml}</ul>

                        <div class="general-explanation">
                            <h6><i class="bi bi-globe2 me-2"></i>🌐 EXPLICAÇÃO GERAL</h6>
                            <ul>${generalHtml}</ul>
                        </div>

                        <div class="real-world">
                            <h6><i class="bi bi-rocket-takeoff me-2"></i>🚀 COMO ISSO SE APLICA NA VIDA REAL</h6>
                            <ul>${realWorldHtml}</ul>
                        </div>
                    </div>
                </div>
            </div>
        `;
        }

        function renderAnchorNav() {
            const nav = document.getElementById('anchorNav');
            const simulados = Object.keys(questionsDatabase);
            nav.innerHTML = simulados.map(arquivo => {
                const label = arquivo.replace('feedback_aws_simulado_', 'Simulado ');
                return `<a href="#${arquivo}"><i class="bi bi-bookmark-fill me-1"></i>${label}</a>`;
            }).join('');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';

            for (const [arquivo, questoes] of Object.entries(questionsDatabase)) {
                // Cabeçalho de seção por simulado
                html += `
            <div class="simulado-section mb-5" id="${arquivo}">
                <div class="simulado-section-header d-flex align-items-center gap-3 mb-4 p-3 rounded-3" style="background:#f0f4ff; border-left:5px solid #ff9900;">
                    <i class="bi bi-journal-bookmark-fill fs-4" style="color:#ff9900;"></i>
                    <div>
                        <div class="fw-bold fs-5" style="color:#1a2a4a;">${arquivo}</div>
                        <div class="text-muted" style="font-size:0.85rem;">
                            <i class="bi bi-collection me-1"></i>${questoes.length} questão(ões)
                        </div>
                    </div>
                </div>
                ${questoes.map(q => renderQuestionCard(q, arquivo)).join('')}
            </div>
        `;
            }

            container.innerHTML = html;
        }

        function renderFooter() {
            const totalCount = Object.values(questionsDatabase).reduce((sum, arr) => sum + arr.length, 0);
            const simuladoCount = Object.keys(questionsDatabase).length;
            const { name } = serviceConfig;
            document.getElementById('footerText').innerHTML = `
        ${totalCount} questões diretas sobre ${name} – AWS Certified Developer Associate (DVA-C02)
        <br><span class="text-muted" style="font-size:0.85rem;">${simuladoCount} simulado(s) • Domínios: Segurança e Desenvolvimento • Todas as explicações completas</span>
    `;
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderAnchorNav();
            renderQuestions();
            renderFooter();
        });
    </script>

</body>

</html>
